<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our BMO Tracker 🥐🧀</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ... Keep all your previous CSS from the first version ... */
        :root {
            --bg-color: #FFF8E7; 
            --card-bg: #FFFFFF;
            --primary: #FFB347; 
            --text: #5D4037; 
            --border: #F0E6D2;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        }

        /* NEW MAP STYLES */
        #map-container {
            width: 100%;
            height: 300px;
            border-radius: 15px;
            border: 2px solid var(--border);
            margin-bottom: 20px;
            overflow: hidden;
            display: none; /* Hidden until map loads */
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* ... Include the rest of the CSS (inputs, buttons, cards, etc.) ... */
        h1 { text-align: center; font-size: 2em; margin-bottom: 5px; }
        p.subtitle { text-align: center; margin-top: 0; color: #8D6E63; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 10px; font-family: inherit; box-sizing: border-box; }
        .category-card { border: 2px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 20px; background-color: #FAFAFA; }
        .category-header { font-size: 1.2em; font-weight: 700; margin-bottom: 15px; }
        .rating-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .rating-input { flex: 1; display: flex; flex-direction: column; }
        .rating-input input[type="number"] { padding: 8px; border: 2px solid var(--border); border-radius: 8px; }
        .slider-group { margin-bottom: 15px; }
        .slider-group input[type="range"] { width: 100%; }
        .coffee-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-weight: bold; }
        button { background-color: var(--primary); color: white; border: none; padding: 15px 20px; border-radius: 12px; font-size: 1.1em; font-weight: 700; cursor: pointer; width: 100%; font-family: inherit; }
        .history { margin-top: 40px; width: 100%; }
        .history-item { background: var(--card-bg); border: 2px solid var(--border); padding: 15px; border-radius: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Our BMO Tracker 🥐🧀</h1>
    <p class="subtitle">The official Copenhagen café rating system</p>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <div class="input-group">
        <label>Search for Café</label>
        <input type="text" id="cafeSearch" placeholder="Start typing café name...">
    </div>

    <div id="categoriesContainer"></div>

    <div class="coffee-toggle">
        <input type="checkbox" id="hadCoffee" onchange="toggleCoffee()">
        <label for="hadCoffee" style="margin:0;">We had coffee here! ☕</label>
    </div>

    <button onclick="calculateAndSave()">Save Review & Pin Map</button>

    <div class="history" id="history">
        <h2>Past BMO Adventures 🗺️</h2>
        <div id="historyList"></div>
    </div>
</div>

<script>
    // --- APP LOGIC ---
    const categories = [
        { id: 'bread', icon: '🍞', name: 'The Bread' },
        { id: 'cheese', icon: '🧀', name: 'The Cheese' },
        { id: 'place', icon: '🪴', name: 'The Place / Vibe' },
        { id: 'price', icon: '💸', name: 'Price / Value' },
        { id: 'coffee', icon: '☕', name: 'The Coffee', hiddenAtStart: true }
    ];

    const container = document.getElementById('categoriesContainer');
    categories.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'category-card';
        div.id = `card-${cat.id}`;
        if (cat.hiddenAtStart) div.style.display = 'none';

        div.innerHTML = `
            <div class="category-header"><span>${cat.icon} ${cat.name}</span></div>
            <div class="rating-row">
                <div class="rating-input"><label>Your Score</label><input type="number" id="${cat.id}-p1" min="1" max="10"></div>
                <div class="rating-input"><label>Partner Score</label><input type="number" id="${cat.id}-p2" min="1" max="10"></div>
            </div>
            <div class="slider-group">
                <label>Weight: <span id="${cat.id}-weight-val">Normal</span></label>
                <input type="range" id="${cat.id}-weight" min="1" max="5" value="3" oninput="updateSliderLabel('${cat.id}')">
            </div>
        `;
        container.appendChild(div);
    });

    function updateSliderLabel(id) {
        const val = document.getElementById(`${id}-weight`).value;
        const labels = ["Don't Care", "Slightly", "Normal", "Important", "Crucial!"];
        document.getElementById(`${id}-weight-val`).innerText = labels[val - 1];
    }

    function toggleCoffee() {
        document.getElementById('card-coffee').style.display = document.getElementById('hadCoffee').checked ? 'block' : 'none';
    }

    // --- MAP LOGIC ---
    let map;
    let markers = [];
    let currentPlaceData = null; // Stores lat/lng before saving

    function initMap() {
        document.getElementById('map-container').style.display = 'block';

        // Center on Copenhagen
        const copenhagen = { lat: 55.6761, lng: 12.5683 };
        
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 12,
            center: copenhagen,
            mapId: "DEMO_MAP_ID" // Can be customized in Google Cloud Console
        });

        // Setup Autocomplete
        const input = document.getElementById("cafeSearch");
        const autocomplete = new google.maps.places.Autocomplete(input);
        autocomplete.bindTo("bounds", map);

        autocomplete.addListener("place_changed", () => {
            const place = autocomplete.getPlace();
            if (!place.geometry || !place.geometry.location) {
                alert("No details available for input: '" + place.name + "'");
                return;
            }

            // Save data temporarily to push into local storage when they hit 'Save'
            currentPlaceData = {
                name: place.name,
                address: place.formatted_address,
                lat: place.geometry.location.lat(),
                lng: place.geometry.location.lng()
            };

            // Pan to the selected café
            map.setCenter(place.geometry.location);
            map.setZoom(15);
        });

        renderHistoryAndPins();
    }

    function calculateAndSave() {
        if (!currentPlaceData) {
            alert("Please search and select a café from the dropdown first!");
            return;
        }

        let sumWeighted = 0, sumWeights = 0;
        const hadCoffee = document.getElementById('hadCoffee').checked;

        categories.forEach(cat => {
            if (cat.id === 'coffee' && !hadCoffee) return;
            const p1 = parseFloat(document.getElementById(`${cat.id}-p1`).value) || 0;
            const p2 = parseFloat(document.getElementById(`${cat.id}-p2`).value) || 0;
            const weight = parseFloat(document.getElementById(`${cat.id}-weight`).value) || 3;
            const catAvg = (p1 + p2) / 2;
            sumWeighted += (catAvg * weight);
            sumWeights += weight;
        });

        const finalWeighted = (sumWeighted / sumWeights).toFixed(1);

        const review = { 
            cafe: currentPlaceData.name, 
            lat: currentPlaceData.lat,
            lng: currentPlaceData.lng,
            date: new Date().toLocaleDateString(), 
            score: finalWeighted 
        };

        let history = JSON.parse(localStorage.getItem('bmoHistory')) || [];
        history.unshift(review);
        localStorage.setItem('bmoHistory', JSON.stringify(history));
        
        currentPlaceData = null; // Reset
        document.getElementById('cafeSearch').value = ''; // Clear search
        
        renderHistoryAndPins();
    }

    function renderHistoryAndPins() {
        const history = JSON.parse(localStorage.getItem('bmoHistory')) || [];
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        
        // Clear old markers
        markers.forEach(marker => marker.setMap(null));
        markers = [];

        history.forEach(item => {
            // Add to list
            list.innerHTML += `<div class="history-item">
                <strong>${item.cafe}</strong> - ${item.date} <br>
                ✨ Score: ${item.score}/10
            </div>`;

            // Add pin to map
            if (item.lat && item.lng && map) {
                const marker = new google.maps.Marker({
                    position: { lat: item.lat, lng: item.lng },
                    map: map,
                    title: `${item.cafe} (${item.score}/10)`
                });
                markers.push(marker);
            }
        });
    }
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAxF46uw7iBJkVyUtMZ6oIyim5x1YlLLWc&libraries=places&callback=initMap" async defer></script>

</body>
</html>
