<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our BMO Tracker 🥐🧀</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFF8E7; 
            --card-bg: #FFFFFF;
            --primary: #FFB347; 
            --secondary: #8D6E63;
            --text: #5D4037; 
            --border: #F0E6D2;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            margin: 0; padding: 0; display: flex; height: 100vh;
            color: var(--text); overflow: hidden;
        }

        .sidebar {
            width: 25%; min-width: 340px; background-color: var(--bg-color);
            padding: 25px; overflow-y: auto; box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            z-index: 10; box-sizing: border-box; display: flex; flex-direction: column;
        }

        .map-area { flex-grow: 1; background-color: #e5e3df; position: relative; }
        #map { width: 100%; height: 100%; }

        h1 { text-align: center; font-size: 1.8em; margin: 0 0 5px 0; }
        p.subtitle { text-align: center; margin-top: 0; color: var(--secondary); margin-bottom: 25px; font-size: 0.9em; }

        /* VIEW CONTAINERS */
        .view-pane { display: none; flex-direction: column; }
        .view-pane.active { display: flex; }

        .input-group { margin-bottom: 20px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; font-size: 0.9em; }
        input[type="text"], input[type="date"], input[type="number"] {
            width: 100%; padding: 10px; border: 2px solid var(--border);
            border-radius: 10px; font-family: inherit; box-sizing: border-box;
        }

        /* FORM STYLES */
        .selected-cafe-title { font-size: 1.4em; font-weight: bold; color: var(--primary); margin-bottom: 15px; border-bottom: 2px dashed var(--border); padding-bottom: 10px;}
        .category-card { border: 2px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; background-color: var(--card-bg); }
        .category-header { font-size: 1.1em; font-weight: 700; margin-bottom: 12px; }
        .rating-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .rating-input { flex: 1; display: flex; flex-direction: column; }
        .slider-group { margin-bottom: 10px; }
        .slider-group input[type="range"] { width: 100%; }
        
        .coffee-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-weight: bold; background: var(--card-bg); padding: 15px; border-radius: 15px; border: 2px solid var(--border); }
        
        /* BUTTONS */
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { background-color: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1em; font-weight: 700; cursor: pointer; width: 100%; font-family: inherit; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        button.cancel-btn { background-color: #E0E0E0; color: var(--text); }

        /* HISTORY & DETAIL STYLES */
        .history { margin-top: 10px; width: 100%; }
        .history-item { background: var(--card-bg); border: 2px solid var(--border); padding: 15px; border-radius: 15px; margin-bottom: 10px; font-size: 0.9em; cursor: pointer; transition: background 0.2s;}
        .history-item:hover { background: #fafafa; }
        
        .detail-card { background: var(--card-bg); border: 2px solid var(--border); padding: 20px; border-radius: 15px; text-align: center;}
        .detail-score { font-size: 2.5em; font-weight: bold; color: var(--primary); margin: 10px 0; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; order: 2; box-shadow: none;}
            .map-area { width: 100%; height: 50vh; order: 1; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>Our BMO Tracker 🥐🧀</h1>
    <p class="subtitle">The official Copenhagen café rating system</p>

    <div id="homeView" class="view-pane active">
        <div class="input-group">
            <label>Add a new place!</label>
            <input type="text" id="cafeSearch" placeholder="Search for a café...">
        </div>
        <div class="history">
            <h2>Past Adventures 🗺️</h2>
            <div id="historyList"></div>
        </div>
    </div>

    <div id="formView" class="view-pane">
        <div class="selected-cafe-title" id="formCafeName">Café Name</div>
        
        <div class="input-group">
            <label>When did we go?</label>
            <input type="date" id="reviewDate">
        </div>

        <div id="categoriesContainer"></div>

        <div class="coffee-toggle">
            <input type="checkbox" id="hadCoffee" onchange="toggleCoffee()">
            <label for="hadCoffee" style="margin:0;">We had coffee here! ☕</label>
        </div>

        <div class="btn-group">
            <button class="cancel-btn" onclick="cancelReview()">Cancel</button>
            <button onclick="calculateAndSave()">Save Review</button>
        </div>
    </div>

    <div id="detailView" class="view-pane">
        <div class="detail-card">
            <h2 id="detailName" style="margin-top:0;">Café Name</h2>
            <p id="detailDate" style="color: var(--secondary);">Date</p>
            <div class="detail-score" id="detailScore">10.0</div>
            <p style="font-weight: 600;">Overall Weighted Score</p>
        </div>
        <button class="cancel-btn" style="margin-top: 20px;" onclick="closeDetail()">Back to Map</button>
    </div>

</div>

<div class="map-area">
    <div id="map"></div>
</div>

<script>
    // --- UI NAVIGATION LOGIC ---
    function showHome() {
        document.getElementById('homeView').classList.add('active');
        document.getElementById('formView').classList.remove('active');
        document.getElementById('detailView').classList.remove('active');
        document.getElementById('cafeSearch').value = ''; 
        currentPlaceData = null;
    }

    function cancelReview() {
        if (activeSearchMarker) activeSearchMarker.setMap(null); // Remove preview pin
        showHome();
        map.setZoom(13); // Zoom back out
    }

    function closeDetail() {
        globalInfoWindow.close(); // Close map bubble
        showHome();
    }

    function showForm(placeName) {
        document.getElementById('homeView').classList.remove('active');
        document.getElementById('formView').classList.add('active');
        document.getElementById('detailView').classList.remove('active');
        
        document.getElementById('formCafeName').innerText = placeName;
        document.getElementById('reviewDate').value = new Date().toISOString().split('T')[0];
        
        categories.forEach(cat => {
            document.getElementById(`${cat.id}-p1`).value = '';
            document.getElementById(`${cat.id}-p2`).value = '';
            document.getElementById(`${cat.id}-weight`).value = '3';
            updateSliderLabel(cat.id);
        });
        document.getElementById('hadCoffee').checked = false;
        toggleCoffee();
    }

    function showDetail(review) {
        document.getElementById('homeView').classList.remove('active');
        document.getElementById('formView').classList.remove('active');
        document.getElementById('detailView').classList.add('active');
        
        document.getElementById('detailName').innerText = review.cafe;
        
        const dateObj = new Date(review.date);
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('detailDate').innerText = dateObj.toLocaleDateString(undefined, options);
        
        document.getElementById('detailScore').innerText = review.score;
    }


    // --- FORM GENERATION LOGIC ---
    const categories = [
        { id: 'bread', icon: '🍞', name: 'The Bread' },
        { id: 'cheese', icon: '🧀', name: 'The Cheese' },
        { id: 'place', icon: '🪴', name: 'The Place / Vibe' },
        { id: 'price', icon: '💸', name: 'Price / Value' },
        { id: 'coffee', icon: '☕', name: 'The Coffee', hiddenAtStart: true }
    ];

    const container = document.getElementById('categoriesContainer');
    categories.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'category-card';
        div.id = `card-${cat.id}`;
        if (cat.hiddenAtStart) div.style.display = 'none';

        div.innerHTML = `
            <div class="category-header"><span>${cat.icon} ${cat.name}</span></div>
            <div class="rating-row">
                <div class="rating-input"><label>Your Score</label><input type="number" id="${cat.id}-p1" min="1" max="10"></div>
                <div class="rating-input"><label>Partner Score</label><input type="number" id="${cat.id}-p2" min="1" max="10"></div>
            </div>
            <div class="slider-group">
                <label>Weight: <span id="${cat.id}-weight-val">Normal</span></label>
                <input type="range" id="${cat.id}-weight" min="1" max="5" value="3" oninput="updateSliderLabel('${cat.id}')">
            </div>
        `;
        container.appendChild(div);
    });

    function updateSliderLabel(id) {
        const val = document.getElementById(`${id}-weight`).value;
        const labels = ["Don't Care", "Slightly", "Normal", "Important", "Crucial!"];
        document.getElementById(`${id}-weight-val`).innerText = labels[val - 1];
    }

    function toggleCoffee() {
        document.getElementById('card-coffee').style.display = document.getElementById('hadCoffee').checked ? 'block' : 'none';
    }

    // --- MAP & DATA LOGIC ---
    let map;
    let markers = [];
    let currentPlaceData = null; 
    let activeSearchMarker = null; // NEW: Temporary marker for searching
    let globalInfoWindow; // NEW: Reusable info bubble

    function initMap() {
        const copenhagen = { lat: 55.6761, lng: 12.5683 };
        
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 13,
            center: copenhagen,
            mapId: "DEMO_MAP_ID",
            mapTypeControl: false,
            streetViewControl: false,
            fullscreenControl: false
        });

        globalInfoWindow = new google.maps.InfoWindow();

        const input = document.getElementById("cafeSearch");
        const autocomplete = new google.maps.places.Autocomplete(input);
        autocomplete.bindTo("bounds", map);

        autocomplete.addListener("place_changed", () => {
            globalInfoWindow.close();
            const place = autocomplete.getPlace();
            if (!place.geometry || !place.geometry.location) return;

            currentPlaceData = {
                name: place.name,
                lat: place.geometry.location.lat(),
                lng: place.geometry.location.lng()
            };

            map.setCenter(place.geometry.location);
            map.setZoom(16);
            
            // NEW: Drop a temporary blue pin to show the user exactly what they selected
            if (activeSearchMarker) activeSearchMarker.setMap(null);
            activeSearchMarker = new google.maps.Marker({
                map: map,
                position: place.geometry.location,
                animation: google.maps.Animation.DROP,
                icon: 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png' 
            });

            showForm(place.name);
        });

        renderHistoryAndPins();
    }

    function calculateAndSave() {
        if (!currentPlaceData) return;

        let sumWeighted = 0, sumWeights = 0;
        const hadCoffee = document.getElementById('hadCoffee').checked;
        const selectedDate = document.getElementById('reviewDate').value; 

        categories.forEach(cat => {
            if (cat.id === 'coffee' && !hadCoffee) return;
            const p1 = parseFloat(document.getElementById(`${cat.id}-p1`).value) || 0;
            const p2 = parseFloat(document.getElementById(`${cat.id}-p2`).value) || 0;
            const weight = parseFloat(document.getElementById(`${cat.id}-weight`).value) || 3;
            const catAvg = (p1 + p2) / 2;
            sumWeighted += (catAvg * weight);
            sumWeights += weight;
        });

        const finalWeighted = (sumWeighted / sumWeights).toFixed(1);

        const review = { 
            cafe: currentPlaceData.name, 
            lat: currentPlaceData.lat,
            lng: currentPlaceData.lng,
            date: selectedDate, 
            score: finalWeighted 
        };

        let history = JSON.parse(localStorage.getItem('bmoHistory')) || [];
        history.unshift(review);
        history.sort((a, b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('bmoHistory', JSON.stringify(history));
        
        // Clear the temporary search marker
        if (activeSearchMarker) activeSearchMarker.setMap(null);

        renderHistoryAndPins();
        showHome();
        map.setZoom(14);
    }

    function renderHistoryAndPins() {
        const history = JSON.parse(localStorage.getItem('bmoHistory')) || [];
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        
        markers.forEach(marker => marker.setMap(null));
        markers = [];

        history.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            const dateStr = new Date(item.date).toLocaleDateString();
            
            div.innerHTML = `
                <strong>${item.cafe}</strong> <br>
                <span style="color: var(--secondary); font-size: 0.9em;">${dateStr}</span> <br>
                ✨ <strong>Score: ${item.score}/10</strong>
            `;
            
            let currentMarker = null;

            // Render Map Pin
            if (item.lat && item.lng && map) {
                currentMarker = new google.maps.Marker({
                    position: { lat: item.lat, lng: item.lng },
                    map: map,
                    title: item.cafe,
                    animation: google.maps.Animation.DROP
                });
                
                // Clicking the physical map pin
                currentMarker.addListener("click", () => {
                    showDetail(item);
                    map.setCenter(currentMarker.getPosition());
                    globalInfoWindow.setContent(`<div style="font-family:'Quicksand'; padding:5px;"><strong>${item.cafe}</strong><br>⭐ ${item.score}/10</div>`);
                    globalInfoWindow.open(map, currentMarker);
                });

                markers.push(currentMarker);
            }

            // NEW: Clicking the list item triggers the map pin logic
            div.onclick = () => {
                showDetail(item);
                if (item.lat && item.lng && currentMarker) {
                    map.setCenter({lat: item.lat, lng: item.lng});
                    map.setZoom(16);
                    globalInfoWindow.setContent(`<div style="font-family:'Quicksand'; padding:5px;"><strong>${item.cafe}</strong><br>⭐ ${item.score}/10</div>`);
                    globalInfoWindow.open(map, currentMarker);
                }
            };
            
            list.appendChild(div);
        });
    }
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAxF46uw7iBJkVyUtMZ6oIyim5x1YlLLWc&libraries=places&callback=initMap" async defer></script>

</body>
</html>
