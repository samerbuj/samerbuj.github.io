<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our BMO Tracker 🥖🧀</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥖</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <h1>Our BMO Tracker 🥖🧀</h1>
    <p class="subtitle">The official Copenhagen café rating system</p>

    <div id="homeView" class="view-pane active">
        <div class="input-group">
            <label>Add a new place!</label>
            <input type="text" id="cafeSearch" placeholder="Search for a café...">
        </div>
        <div class="history">
            <h2>Past Adventures 🗺️</h2>
            <div id="historyList"></div>
        </div>
    </div>

    <div id="formView" class="view-pane">
        <div class="selected-cafe-title" id="formCafeName">Café Name</div>
        
        <div class="google-info-card">
            <div class="google-rating" id="formGoogleRating">Google Rating: - / 5</div>
            <div class="photo-gallery" id="formPhotos"></div>
        </div>
        
        <div class="input-group">
            <label>When did we go?</label>
            <input type="date" id="reviewDate">
        </div>

        <div id="categoriesContainer"></div>

        <div class="input-group">
            <label>Final Thoughts / Comments</label>
            <textarea id="reviewComment" rows="3" placeholder="Any extra thoughts?"></textarea>
        </div>

        <div class="coffee-toggle">
            <input type="checkbox" id="hadCoffee" onchange="toggleCoffee()">
            <label for="hadCoffee" style="margin:0;">We had coffee here! ☕</label>
        </div>

        <div class="btn-group">
            <button class="cancel-btn" onclick="cancelReview()">Cancel</button>
            <button onclick="calculateAndSave()">Save Review</button>
        </div>
    </div>

    <div id="detailView" class="view-pane">
        <div class="detail-card">
            <h2 id="detailName" style="margin-top:0; margin-bottom: 5px;">Café Name</h2>
            <p id="detailDate" style="color: var(--secondary); margin-top: 0;">Date</p>
            
            <p style="font-weight: 600; margin-bottom: 0;">Our Score</p>
            <div class="detail-score" id="detailScore">10.0</div>
            
            <div class="vs-badge" id="detailComparison">vs. Google: 4.5/5</div>
        </div>

        <div id="detailCommentContainer" class="comment-display" style="display: none;">
            "<span id="detailCommentText"></span>"
        </div>

        <div class="google-info-card" style="padding: 15px;">
            <label style="margin-bottom: 10px;">Vibes & Photos</label>
            <div class="photo-gallery" id="detailPhotos"></div>
        </div>

        <div class="action-btn-group">
            <button class="edit-btn" onclick="openEditForm()">Edit</button>
            <button class="delete-btn" onclick="deleteReview()">Delete</button>
        </div>
        <button class="cancel-btn" style="margin-top: 10px;" onclick="closeDetail()">Back to Map</button>
    </div>

<div class="map-area">
    <div id="map"></div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
